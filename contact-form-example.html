<!-- CONTACTFORMULIER MET FORMSPREE -->
<!-- 
Stappen:
1. Ga naar https://formspree.io
2. Maak gratis account aan
3. Maak nieuw formulier
4. Vervang "YOUR_FORM_ID" hieronder door jouw Formspree form ID
5. Kopieer dit formulier naar je contact.html
-->

<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="contact-form">
  <div class="form-group">
    <label for="name">Naam *</label>
    <input type="text" id="name" name="name" required>
  </div>

  <div class="form-group">
    <label for="email">Email *</label>
    <input type="email" id="email" name="email" required>
  </div>

  <div class="form-group">
    <label for="phone">Telefoon</label>
    <input type="tel" id="phone" name="phone">
  </div>

  <div class="form-group">
    <label for="subject">Onderwerp *</label>
    <select id="subject" name="subject" required>
      <option value="">Kies een optie...</option>
      <option value="On-road training">On-road training</option>
      <option value="Off-road training">Off-road training</option>
      <option value="Rijbewijs A">Rijbewijs A</option>
      <option value="Motorkar verhuur">Motorkar verhuur</option>
      <option value="Andere vraag">Andere vraag</option>
    </select>
  </div>

  <div class="form-group">
    <label for="message">Bericht *</label>
    <textarea id="message" name="message" rows="5" required></textarea>
  </div>

  <button type="submit" class="btn btn-primary">
    Verstuur bericht <span class="arr">→</span>
  </button>
</form>

<!-- CSS voor formulier -->
<style>
.contact-form{display:flex;flex-direction:column;gap:20px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:32px}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-group label{font-weight:600;font-size:14px;color:var(--ink)}
.form-group input,
.form-group select,
.form-group textarea{
  font-family:inherit;
  font-size:15px;
  padding:12px 16px;
  border:1.5px solid var(--line);
  border-radius:10px;
  transition:border-color .2s,box-shadow .2s;
  background:#fff;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);
}
.form-group textarea{resize:vertical;min-height:120px}
.contact-form .btn{align-self:flex-start}
</style>
